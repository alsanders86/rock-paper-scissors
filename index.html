<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors!</title>
</head>
<body>
    <script>

        function computerPlay() {
            var choices = [
                'Rock',
                'Paper',
                'Scissors'
            ];

            // return random number out of 3
            var randomNumber = Math.floor(Math.random()*choices.length);

            return choices[randomNumber];
        }

        console.log(computerPlay());
    </script>
</body>
</html>
