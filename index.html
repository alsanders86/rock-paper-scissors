<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors!</title>
</head>
<body>
    <script>

        function computerPlay() {
            var choices = [
                'rock',
                'paper',
                'scissors'
            ];

            // return random number out of 3
            var randomNumber = Math.floor(Math.random()*choices.length);

            return choices[randomNumber];
        }

        // testing computer input
        // console.log(computerPlay());

        function playerPlay() {
            var input = window.prompt("Choose rock, paper or scissors");
            input = input.toLowerCase();

            // loop until user enters a valid input
            while (input != "rock" && input != "paper" && input != "scissors") {
                input = window.prompt("Enter a valid option: rock paper or scissors!");
                input = input.toLowerCase();
            } 
            return input;
        }

        // testing player input
        // console.log(playerPlay());


        var playerScore = 0;
        var computerScore = 0;

        function playRound(playerChoice, compChoice) {
            if(playerChoice == "rock") {
                if(compChoice == "rock") {
                    console.log("Tie!");
                    // no points
                } else if (compChoice == "paper") {
                    computerScore++;
                    console.log("Comp wins");
                } else if (compChoice == "scissors") {
                    playerScore++;
                    console.log("User wins");
                }
            } else if(playerChoice == "paper") {
                if(compChoice == "rock") {
                    playerScore++;
                    console.log("User wins");
                } else if (compChoice == "paper") {
                    console.log("Tie");
                    // no points
                } else if (compChoice == "scissors") {
                    computerScore++;
                    console.log("Comp wins");
                }
            } else if(playerChoice == "scissors") {
                if(compChoice == "rock") {
                    computerScore++;
                    console.log("Comp wins");
                } else if (compChoice == "paper") {
                    playerScore++;
                    console.log("User wins");
                } else if (compChoice == "scissors") {
                    console.log("Tie");
                    // no points
                }
            }
            
            console.log("User: " + playerScore + ", Computer: " + computerScore);
        }

        function game() {
            var playerSelection;
            var computerSelection;
            while (playerScore < 5 && computerScore < 5) {
                playerSelection = playerPlay();
                computerSelection = computerPlay();

                playRound(playerSelection, computerSelection); 
            }

            if (playerScore == 5) {
                console.log("User wins the game!");
            } else {
                console.log("Computer wins the game!");
            }
        }

        // play the game!
        game();

    </script>
</body>
</html>
